name: 🚀 Deploy to Staging

on:
  push:
    branches: [develop]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8'
  # Docker image names — update with your Docker Hub or ECR registry
  API_IMAGE: trandora/api
  WEB_IMAGE: trandora/web

jobs:
  # ============================================
  # Step 1: Build & Test (same as CI)
  # ============================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: trandora
          MONGO_INITDB_ROOT_PASSWORD: trandora_ci
          MONGO_INITDB_DATABASE: trandora_test
        options: >-
          --health-cmd "echo 'db.runCommand({ping:1})' | mongosh --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test
        env:
          MONGODB_URI: mongodb://trandora:trandora_ci@localhost:27017/trandora_test?authSource=admin
          JWT_SECRET: ci-test-secret-key
          NODE_ENV: test

  # ============================================
  # Step 2: Build Docker Images
  # ============================================
  docker-build:
    name: Build Docker Images
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 🐳 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/Dockerfile.api
          push: true
          tags: |
            ${{ env.API_IMAGE }}:staging
            ${{ env.API_IMAGE }}:staging-${{ github.sha }}

      - name: 🏗️ Build & push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/Dockerfile.web
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:staging
            ${{ env.WEB_IMAGE }}:staging-${{ github.sha }}

  # ============================================
  # Step 3: Deploy to Staging Server
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 🚀 Deploy to staging server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/trandora

            # Pull latest images
            docker pull ${{ env.API_IMAGE }}:staging
            docker pull ${{ env.WEB_IMAGE }}:staging

            # Restart services
            docker-compose -f docker-compose.staging.yml down
            docker-compose -f docker-compose.staging.yml up -d

            # Health check
            sleep 10
            curl -f http://localhost:4000/api/v1/health || exit 1
            echo "✅ Staging deployment successful!"

      - name: 📢 Notify deployment
        if: always()
        run: |
          echo "🚀 Staging deployed: ${{ github.sha }}"
          echo "   Branch: ${{ github.ref_name }}"
          echo "   Status: ${{ job.status }}"
