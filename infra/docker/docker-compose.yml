version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: trandora-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: trandora-redis
    ports:
      - '6379:6379'
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    container_name: trandora-mongo-express
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH: 'false'
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongodb_data:
